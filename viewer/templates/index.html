<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Viewer CSP — explorateur SQLite</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="/molviz_static/molviz.css">
  <!-- 3Dmol.js : visualisation 3D des molecules -->
  <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
</head>
<body>
  <header>
    <h1>Viewer CSP</h1>
    <label class="ds-picker">
      Dataset :
      <select id="dataset-select"></select>
    </label>
    <nav id="breadcrumb">
      <a href="#" data-go="dashboard">Dashboard</a>
    </nav>
    <a href="/designer" class="header-designer-link" title="Dessiner un benzenoide et lancer le CSP">
      ✏️ Designer
    </a>
    <div id="loader" class="loader hidden">
      <div class="spinner"></div>
      <span id="loader-text">Chargement…</span>
    </div>
  </header>

  <main>
    <!-- Vue 1 : dashboard global -->
    <section id="view-dashboard" class="view">
      <h2>Vue d'ensemble</h2>
      <p id="summary-text" class="muted"></p>
      <div id="configs-grid" class="configs-grid"></div>
    </section>

    <!-- Vue 2 : liste des molécules d'une config -->
    <section id="view-config" class="view hidden">
      <h2 id="config-title"></h2>
      <div id="config-description" class="config-description"></div>
      <div class="toolbar">
        <input type="text" id="mol-search" placeholder="Filtrer par nom (ex: 0-10-19-…)" />
        <label>
          Tri :
          <select id="mol-sort">
            <option value="name">Nom</option>
            <option value="plans">Plus de plans</option>
            <option value="sols">Plus de solutions</option>
            <option value="min_angle">Angle min ↑</option>
          </select>
        </label>
        <label>
          Page size :
          <select id="mol-pagesize">
            <option>25</option>
            <option selected>50</option>
            <option>100</option>
            <option>200</option>
          </select>
        </label>
      </div>
      <div id="mol-table-wrap"></div>
      <div class="pagination" id="mol-pagination"></div>
    </section>

    <!-- Vue 4 : resultats d'un job designer (route /?job=<id>) -->
    <section id="view-job" class="view hidden">
      <h2 id="job-title">Job designer</h2>
      <div id="job-meta" class="meta-box"></div>
      <h3 id="job-original-title" style="margin-top:1rem;margin-bottom:0.4rem">Benzenoide d'entree</h3>
      <div id="job-original-box" class="meta-box"></div>
      <h3 style="margin-top:1rem;margin-bottom:0.4rem">Solutions CSP</h3>
      <div class="toolbar">
        <input type="text" id="job-sol-search" placeholder="Filtrer par sol_idx ou sizes" />
        <label>
          Filtre :
          <select id="job-sol-filter">
            <option value="all" selected>Toutes</option>
            <option value="plan">Plans</option>
            <option value="non_plan">Non plans</option>
            <option value="md_failed">MD echec</option>
            <option value="unknown">Sans verdict</option>
          </select>
        </label>
        <a id="job-back-designer" href="/designer" class="header-designer-link" style="margin-left:auto">
          ← Retour au designer
        </a>
      </div>
      <div id="job-sol-table-wrap"></div>
    </section>

    <!-- Vue 3 : solutions d'une molécule -->
    <section id="view-mol" class="view hidden">
      <h2 id="mol-title"></h2>
      <div id="mol-meta" class="meta-box"></div>
      <div class="toolbar">
        <input type="text" id="sol-search" placeholder="Filtrer par sol_idx ou sizes (ex: 6_6_6_6_6_5_7_5_7)" />
        <label>
          Filtre :
          <select id="sol-filter">
            <option value="all">Toutes</option>
            <option value="validated">Validées (plans + non plans)</option>
            <option value="plans" selected>Plans uniquement (ACP)</option>
            <option value="non_plans">Non plans (ACP)</option>
            <optgroup label="Critère dièdre (Denis)">
              <option value="tres_plan">Très plan (&lt; 10°)</option>
              <option value="acceptable">Acceptable (10–25°)</option>
              <option value="non_plan_dih">Non plan (&ge; 25°)</option>
            </optgroup>
            <option value="infeasible">Géom. infaisables</option>
            <option value="xtb_failed">xTB échec</option>
          </select>
        </label>
        <label>
          Tri :
          <select id="sol-sort">
            <option value="angle">Angle ACP croissant</option>
            <option value="angle_desc">Angle ACP décroissant</option>
            <option value="dihedral">Dièdre max croissant</option>
            <option value="dihedral_desc">Dièdre max décroissant</option>
            <option value="idx">Sol_idx croissant</option>
            <option value="idx_desc">Sol_idx décroissant</option>
          </select>
        </label>
        <label>
          Page size :
          <select id="sol-pagesize">
            <option>25</option>
            <option selected>50</option>
            <option>100</option>
            <option>200</option>
          </select>
        </label>
      </div>
      <div id="sol-table-wrap"></div>
      <div class="pagination" id="sol-pagination"></div>
    </section>
  </main>

  <script src="/molviz_static/molviz.js"></script>
  <script src="{{ url_for('static', filename='config_descriptions.js') }}"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
